# ==============================================================
#  pyproject.toml （flake8 / pytest / mypy / black 統合設定）
# ==============================================================

[tool.black]
line-length = 88
target-version = ["py311"]

# ==============================================================
# 🔹 pytest 設定
# ==============================================================

[tool.pytest.ini_options]
addopts = "-v -s --tb=short --durations=3 --cov=utils --cov-report=term-missing"
testpaths = ["tests"]
python_files = ["test_*.py"]
python_paths = [
    ""
]

markers = [
    "simple: 基本的なテスト（軽い・PyQ系）",
    "api: API関連のテスト（Flask/Django/HTTP通信など）",
    "db: データベース関連のテスト（SQLAlchemyやORM）",
    "slow: 実行に時間がかかるテスト（time.sleepや外部通信など）",
    "unit: 単体テスト（関数レベル）",
    "integration: 統合テスト（複数モジュール連携）"
]

filterwarnings = ["ignore::DeprecationWarning"]
norecursedirs = [".pytest_cache"]


# ==============================================================
# 🔹 mypy 設定
# ==============================================================

[tool.mypy]
python_version = "3.11"
strict = true

warn_unused_configs = true
warn_return_any = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_no_return = true
warn_unreachable = true

no_implicit_optional = true
ignore_missing_imports = true

disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true

exclude = [
  "^django_forge_01_basics/asgi\\.py$",
  "^django_forge_01_basics/wsgi\\.py$",
  "^pages/migrations/.*$",
]

plugins = ["mypy_django_plugin.main"]


# ==============================================================
# 🔹 django-stubs 設定
# ==============================================================

[tool.django-stubs]
django_settings_module = "django_forge_01_basics.settings"
strict_settings = true
strict_model_abstract_attrs = true
